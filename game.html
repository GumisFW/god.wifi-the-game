<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GOD.WIFI TOWER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex; align-items:center; justify-content:center;
      height:100vh; overflow:hidden;
      font-family:'Press Start 2P', monospace;
    }
    #gameCanvas {
      display:block; image-rendering:pixelated;
      border:3px solid #e00;
      box-shadow:0 0 40px rgba(220,0,0,0.45), 0 0 80px rgba(220,0,0,0.15);
    }
    #ui {
      position:absolute; top:0;left:0;right:0;bottom:0;
      pointer-events:none; display:flex; align-items:center; justify-content:center;
    }
    #overlay {
      background:rgba(0,0,0,0.9); border:4px solid #e00;
      padding:28px 36px; text-align:center; color:#fff;
      max-width:320px; width:90%; box-shadow:6px 6px 0 #900;
    }
    #overlay h1 { font-size:clamp(0.8rem,3.5vw,1.3rem); color:#e00; margin-bottom:8px; text-shadow:3px 3px 0 #600; line-height:1.8; }
    #overlay .sub { font-size:clamp(0.35rem,1.5vw,0.52rem); color:#888; margin-bottom:18px; line-height:2.2; }
    #startBtn {
      font-family:'Press Start 2P',monospace; font-size:clamp(0.5rem,2vw,0.75rem);
      color:#fff; background:#000; border:3px solid #e00; padding:12px 28px;
      cursor:pointer; pointer-events:all; letter-spacing:0.1em;
      box-shadow:4px 4px 0 #900; animation:btnPulse 1.2s steps(1) infinite;
    }
    #startBtn:hover { background:#e00; }
    @keyframes btnPulse { 0%,49%{box-shadow:4px 4px 0 #900;} 50%,100%{box-shadow:4px 4px 0 #f44;} }
    .vbtn {
      position:fixed; bottom:20px; width:62px; height:62px;
      background:rgba(0,0,0,0.55); border:3px solid rgba(220,0,0,0.8);
      display:flex; align-items:center; justify-content:center;
      font-family:'Press Start 2P',monospace; color:#fff; font-size:22px;
      cursor:pointer; user-select:none; z-index:100; border-radius:6px; touch-action:none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="overlay">
    <h1>GOD.WIFI<br>TOWER</h1>
    <div class="sub">← → RUCH &nbsp; SPACJA / ↑ SKOK<br>LĄDUJ WYSOKO = COMBO!</div>
    <button id="startBtn" onclick="startGame()">► START ◄</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  CANVAS
// ═══════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
function resize(){
  const mH=window.innerHeight-6, mW=window.innerWidth-6, r=9/16;
  let h=mH, w=h*r; if(w>mW){w=mW;h=w/r;}
  canvas.width=Math.floor(w); canvas.height=Math.floor(h);
}
resize(); window.addEventListener('resize',resize);
const W=()=>canvas.width, H=()=>canvas.height;

// ═══════════════════════════════════
//  ASSETS
// ═══════════════════════════════════
const bgImg = new Image(); bgImg.src = 'ggodwifipingwintlo.png';

// ═══════════════════════════════════
//  THEMES  — platform style + pixel props
// ═══════════════════════════════════
const THEMES = [
  {
    id:'street', name:'STREET', floorStart:0,
    bg0:'#080808', bg1:'#111',
    // asphalt platform
    platDraw: drawPlatStreet,
    particleColor:'#ff8800',
    stars:15,
  },
  {
    id:'music', name:'STUDIO', floorStart:18,
    bg0:'#080614', bg1:'#100a20',
    platDraw: drawPlatMusic,
    particleColor:'#b388ff',
    stars:50,
  },
  {
    id:'bmx', name:'BMX PARK', floorStart:38,
    bg0:'#0a0600', bg1:'#180d00',
    platDraw: drawPlatBmx,
    particleColor:'#ff6b00',
    stars:20,
  },
  {
    id:'photo', name:'PHOTOSHOOT', floorStart:60,
    bg0:'#050505', bg1:'#0d0d0d',
    platDraw: drawPlatPhoto,
    particleColor:'#ff4dac',
    stars:80,
  },
  {
    id:'clip', name:'KLIP', floorStart:85,
    bg0:'#000a06', bg1:'#001508',
    platDraw: drawPlatClip,
    particleColor:'#00e676',
    stars:30,
  },
  {
    id:'stage', name:'STAGE', floorStart:115,
    bg0:'#0f0000', bg1:'#1a0000',
    platDraw: drawPlatStage,
    particleColor:'#ff1744',
    stars:100,
  },
  {
    id:'peak', name:'GOD MODE', floorStart:150,
    bg0:'#0c0800', bg1:'#1a1000',
    platDraw: drawPlatPeak,
    particleColor:'#ffd700',
    stars:140,
  },
];

function getTheme(f){
  for(let i=THEMES.length-1;i>=0;i--) if(f>=THEMES[i].floorStart) return THEMES[i];
  return THEMES[0];
}

// ═══════════════════════════════════
//  PLATFORM DRAW FUNCTIONS
//  Each draws a platform at (0,0) with given w,h
//  (ctx is already translated)
// ═══════════════════════════════════

// ── STREET / ASPHALT ─────────────────
function drawPlatStreet(w, h, seed) {
  const rng = seededRng(seed);
  // asphalt base
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(0, 0, w, h);
  // concrete cracks
  ctx.fillStyle = '#1a1a1a';
  for(let x=0;x<w;x+=8){ ctx.fillRect(x,0,1,h); }
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, w, 3);
  ctx.fillRect(0, h-2, w, 2);
  // yellow road line
  ctx.fillStyle = '#e8c000';
  ctx.fillRect(0, Math.floor(h/2)-1, w, 2);
  // pixel props: sneakers / can / broken phone
  const props = ['sneaker','can','phone'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-20));
  drawProp(prop, px, 0, h);
}

// ── MUSIC STUDIO ─────────────────────
function drawPlatMusic(w, h, seed) {
  const rng = seededRng(seed);
  // soviet carpet tiles — red/burgundy checkerboard
  for(let x=0;x<w;x+=8){
    for(let y=0;y<h;y+=4){
      const dark = ((Math.floor(x/8)+Math.floor(y/4))%2)===0;
      ctx.fillStyle = dark ? '#6b0a1a' : '#8c1020';
      ctx.fillRect(x, y, 8, 4);
    }
  }
  // carpet border ornament
  ctx.fillStyle = '#c8a000';
  ctx.fillRect(0,0,w,2);
  ctx.fillRect(0,h-2,w,2);
  for(let x=0;x<w;x+=12){ ctx.fillRect(x,0,4,4); }
  // props: mic stand / headphones / music note
  const props = ['mic','headphones','note'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-18));
  drawProp(prop, px, 0, h);
}

// ── BMX PARK ─────────────────────────
function drawPlatBmx(w, h, seed) {
  const rng = seededRng(seed);
  // concrete ramp texture
  ctx.fillStyle = '#c8c0b0';
  ctx.fillRect(0, 0, w, h);
  // grunge lines
  ctx.fillStyle = '#b0a890';
  for(let x=0;x<w;x+=6){ if(rng()>0.6) ctx.fillRect(x,0,2,h); }
  ctx.fillStyle = '#888';
  ctx.fillRect(0, 0, w, 3);
  // graffiti strip
  ctx.fillStyle = '#e00';
  ctx.fillRect(0, h-4, w, 2);
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(0, h-2, w, 2);
  // props: bmx wheel / spray can / skate
  const props = ['bmx','spray','skate'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-18));
  drawProp(prop, px, 0, h);
}

// ── PHOTOSHOOT ───────────────────────
function drawPlatPhoto(w, h, seed) {
  const rng = seededRng(seed);
  // white seamless paper / reflective floor
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(0, 0, w, h);
  // reflection shimmer
  for(let x=0;x<w;x+=16){
    ctx.fillStyle = `rgba(255,255,255,${0.3+rng()*0.3})`;
    ctx.fillRect(x, 0, 8, h);
  }
  ctx.fillStyle = '#ccc';
  ctx.fillRect(0, 0, w, 2);
  // props: camera / tripod / ring light
  const props = ['camera','tripod','light'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-18));
  drawProp(prop, px, 0, h);
}

// ── MUSIC VIDEO KLIP ─────────────────
function drawPlatClip(w, h, seed) {
  const rng = seededRng(seed);
  // dark industrial with green monitor glow
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = '#00301a';
  ctx.fillRect(0, 0, w, 3);
  // LED strip edge
  for(let x=0;x<w;x+=4){
    ctx.fillStyle = rng()>0.4 ? '#00e676' : '#00a854';
    ctx.fillRect(x, 0, 3, 2);
  }
  ctx.fillStyle = '#002010';
  ctx.fillRect(0, h-3, w, 3);
  // props: clapperboard / monitor / camera on stand
  const props = ['clapper','monitor','filmcam'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-18));
  drawProp(prop, px, 0, h);
}

// ── STAGE ────────────────────────────
function drawPlatStage(w, h, seed) {
  const rng = seededRng(seed);
  // dark wood stage
  ctx.fillStyle = '#1a0800';
  ctx.fillRect(0, 0, w, h);
  for(let x=0;x<w;x+=10){
    ctx.fillStyle = rng()>0.5 ? '#220b00' : '#180600';
    ctx.fillRect(x, 0, 9, h);
  }
  // stage front glow red/orange
  ctx.fillStyle = '#ff1700';
  ctx.fillRect(0, 0, w, 2);
  for(let x=0;x<w;x+=16){
    ctx.fillStyle = rng()>0.5 ? '#ff4400' : '#ff1700';
    ctx.fillRect(x, 0, 8, 3);
  }
  // props: mic stand / speaker / spotlight
  const props = ['micstand','speaker','spot'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-18));
  drawProp(prop, px, 0, h);
}

// ── PEAK / GOD MODE ──────────────────
function drawPlatPeak(w, h, seed) {
  const rng = seededRng(seed);
  // gold marble
  ctx.fillStyle = '#2a1f00';
  ctx.fillRect(0, 0, w, h);
  for(let x=0;x<w;x+=8){
    ctx.fillStyle = rng()>0.5 ? '#3a2b00' : '#2a1f00';
    ctx.fillRect(x, 0, 7, h);
  }
  // gold top
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(0, 0, w, 3);
  for(let x=0;x<w;x+=10){
    ctx.fillStyle = rng()>0.4 ? '#ffe44d' : '#cc9900';
    ctx.fillRect(x, 0, 6, 3);
  }
  // props: crown / trophy / stars
  const props = ['crown','trophy','goldstar'];
  const prop = props[Math.floor(rng()*props.length)];
  const px = 6 + Math.floor(rng()*(w-18));
  drawProp(prop, px, 0, h);
}

// ═══════════════════════════════════
//  PIXEL PROP DRAWER
//  All props are tiny 8-16px pixel art drawn above platform top
// ═══════════════════════════════════
function drawProp(type, px, platY, platH) {
  // props sit ON TOP of the platform (y < 0 relative to platform top)
  const P = (x,y,w,h,c) => { ctx.fillStyle=c; ctx.fillRect(px+x, platY-h-y+platH, w, h); };
  // note: platY=0 always since we're in translated context, so top surface is y=0
  const T = (x,y,w,h,c) => { ctx.fillStyle=c; ctx.fillRect(px+x, -y-h, w, h); };

  switch(type) {
    case 'sneaker': // pixel shoe
      T(0,0,10,4,'#222'); T(1,4,8,3,'#e8e8e8'); T(0,7,10,2,'#333'); T(3,9,5,2,'#e00');
      break;
    case 'can': // spray/drink can
      T(1,0,5,10,'#e00'); T(0,8,7,2,'#ccc'); T(2,2,3,1,'#fff'); T(1,10,5,2,'#888');
      break;
    case 'phone': // broken phone
      T(0,0,8,12,'#111'); T(1,1,6,8,'#002244'); T(2,10,4,1,'#555'); T(3,2,2,2,'#f00');
      break;
    case 'mic': // microphone on short stand
      T(2,0,4,6,'#888'); T(1,6,6,4,'#aaa'); T(3,6,2,8,'#555'); T(2,14,4,2,'#444');
      break;
    case 'headphones':
      T(0,8,12,3,'#222'); T(0,8,2,8,'#222'); T(10,8,2,8,'#222');
      T(0,0,4,4,'#e00'); T(8,0,4,4,'#e00');
      break;
    case 'note': // music note ♪
      T(4,0,4,2,'#fff'); T(7,0,1,8,'#fff'); T(4,6,4,4,'#fff'); T(3,9,5,2,'#fff');
      break;
    case 'bmx': // wheel
      T(2,0,8,8,'#333'); T(4,2,4,4,'#555'); T(5,3,2,2,'#888');
      T(0,3,12,2,'#333'); T(5,0,2,8,'#333');
      break;
    case 'spray':
      T(1,0,4,12,'#ff4400'); T(0,10,6,2,'#ccc'); T(2,12,2,2,'#888'); T(2,0,2,2,'#fff');
      break;
    case 'skate': // skateboard
      T(0,2,14,4,'#8B4513'); T(1,0,12,2,'#fff'); T(2,6,3,3,'#888'); T(9,6,3,3,'#888');
      break;
    case 'camera': // pixel camera body
      T(0,2,14,10,'#222'); T(4,0,6,3,'#333'); T(5,3,4,4,'#4488ff');
      T(3,3,2,4,'#888'); T(10,4,2,2,'#f00'); T(1,8,3,2,'#555');
      break;
    case 'tripod':
      T(5,0,2,14,'#888'); T(1,10,4,2,'#888'); T(7,10,4,2,'#888');
      T(3,14,4,2,'#666'); T(4,0,5,4,'#555');
      break;
    case 'light': // ring light
      T(0,4,14,8,'#888'); T(2,2,10,12,'#888'); T(4,4,6,8,'#000');
      T(2,6,2,2,'#fff'); T(10,6,2,2,'#fff'); T(6,2,2,2,'#fff'); T(6,12,2,2,'#fff');
      break;
    case 'clapper': // clapperboard
      T(0,4,14,10,'#fff'); T(0,4,14,3,'#222'); T(0,0,14,4,'#222');
      T(2,0,3,4,'#fff'); T(7,0,3,4,'#fff'); T(1,6,3,2,'#000'); T(6,6,3,2,'#000');
      break;
    case 'monitor': // monitor
      T(0,2,14,10,'#111'); T(1,3,12,8,'#002a14'); T(4,0,6,2,'#333');
      T(5,12,4,2,'#444'); T(3,4,2,2,'#00e676'); T(7,5,2,1,'#00e676');
      break;
    case 'filmcam':
      T(0,2,12,8,'#222'); T(8,0,4,4,'#333'); T(0,4,3,4,'#888');
      T(3,4,6,6,'#4488ff'); T(10,3,2,2,'#fff');
      break;
    case 'micstand': // tall mic on stand
      T(4,0,4,6,'#888'); T(3,6,6,4,'#aaa'); T(5,6,2,10,'#555'); T(2,16,8,2,'#444');
      break;
    case 'speaker':
      T(0,0,10,14,'#111'); T(1,1,8,12,'#222'); T(3,3,4,4,'#888');
      T(2,8,6,3,'#666'); T(1,12,8,1,'#555');
      break;
    case 'spot': // stage spotlight
      T(3,0,6,4,'#888'); T(2,4,8,6,'#ffee00'); T(0,10,12,3,'#aaa');
      T(4,1,4,3,'#fff'); T(1,10,10,2,'#ffdd00');
      break;
    case 'crown':
      T(0,6,14,6,'#ffd700'); T(0,0,2,8,'#ffd700'); T(6,2,2,8,'#ffd700'); T(12,0,2,8,'#ffd700');
      T(1,3,2,2,'#e00'); T(7,3,2,2,'#e00'); T(2,6,10,1,'#ffff88');
      break;
    case 'trophy':
      T(3,0,8,8,'#ffd700'); T(0,2,4,4,'#ffd700'); T(10,2,4,4,'#ffd700');
      T(5,8,4,6,'#cc8800'); T(2,14,10,2,'#888'); T(4,6,6,2,'#ffe88a');
      break;
    case 'goldstar':
      T(5,0,4,4,'#ffd700'); T(0,4,14,4,'#ffd700'); T(2,8,4,4,'#ffd700'); T(8,8,4,4,'#ffd700');
      T(5,3,4,8,'#ffd700'); T(6,2,2,10,'#ffe88a');
      break;
  }
}

// ═══════════════════════════════════
//  SEEDED RNG
// ═══════════════════════════════════
function seededRng(seed) {
  let s = seed * 9301 + 49297;
  return function() { s=(s*9301+49297)%233280; return s/233280; };
}

// ═══════════════════════════════════
//  PLATFORM SYSTEM
// ═══════════════════════════════════
const PLAT_H     = () => Math.max(10, Math.floor(H()*0.018));
const GAP_Y      = () => H() * 0.112;
const PLAT_W_MIN = () => W() * 0.13;
const PLAT_W_MAX = () => W() * 0.34;

let platSeed = 1;
function makePlat(y, ground=false) {
  const w = ground ? W() : PLAT_W_MIN() + Math.random()*(PLAT_W_MAX()-PLAT_W_MIN());
  const x = ground ? 0   : Math.random()*(W()-w);
  platSeed++;
  return { x, y, w, h:ground?14:PLAT_H(), ground, seed:platSeed };
}

let platforms = [];
function buildPlatforms() {
  platforms = [];
  platSeed = 1;
  platforms.push(makePlat(H()-18, true));
  let y = H()-18-GAP_Y();
  while(y > -H()*6) {
    platforms.push(makePlat(y));
    y -= GAP_Y()*(0.72+Math.random()*0.55);
  }
}

// ═══════════════════════════════════
//  PLATFORM RENDERER  (cached to offscreen canvas)
// ═══════════════════════════════════
const platCache = new Map();

function getPlatCanvas(plat, theme) {
  const key = `${theme.id}_${Math.round(plat.w)}_${plat.seed}`;
  if(platCache.has(key)) return platCache.get(key);

  const oc = document.createElement('canvas');
  oc.width  = Math.ceil(plat.w);
  oc.height = plat.h + 20; // extra room for props above
  const oc_ctx = ctx; // we'll swap below

  // use offscreen 2d context
  const c = oc.getContext('2d');
  const prevCtx = ctx;

  // temporarily replace ctx calls — we draw directly to c
  // We'll draw into c by translating
  c.save();
  c.translate(0, 20); // 20px headroom for props
  theme.platDraw.call(null, Math.ceil(plat.w), plat.h, plat.seed);
  // above call uses outer ctx — need to use c instead
  c.restore();

  platCache.set(key, oc);
  return oc;
}

function drawPlatform(plat, theme) {
  const sy = Math.round(plat.y - cameraY);
  if(sy > H()+40 || sy < -60) return;

  ctx.save();
  ctx.translate(Math.round(plat.x), sy);
  theme.platDraw(Math.round(plat.w), plat.h, plat.seed);
  ctx.restore();
}

// ═══════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════
let bgStars = [];
function buildStars(n) {
  return Array.from({length:n}, ()=>({
    x:Math.random()*W(), y:Math.random()*4000,
    size:Math.random()<0.25?2:1,
    alpha:0.3+Math.random()*0.7,
    speed:0.12+Math.random()*0.3,
  }));
}

function drawBackground(theme) {
  // dark gradient
  const g = ctx.createLinearGradient(0,0,0,H());
  g.addColorStop(0,theme.bg0); g.addColorStop(1,theme.bg1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W(),H());

  // bg photo parallax
  if(bgImg.complete && bgImg.naturalWidth>0) {
    const par = (cameraY*0.06) % H();
    ctx.globalAlpha=0.22;
    ctx.drawImage(bgImg, 0, par,     W(), H());
    ctx.drawImage(bgImg, 0, par-H(), W(), H());
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(0,0,0,0.58)'; ctx.fillRect(0,0,W(),H());
  }

  // stars
  bgStars.forEach(s=>{
    const sy=((s.y-cameraY*s.speed)%H()+H())%H();
    ctx.fillStyle=`rgba(255,255,255,${s.alpha})`;
    ctx.fillRect(Math.round(s.x), Math.round(sy), s.size, s.size);
  });

  // vignette
  const v=ctx.createRadialGradient(W()/2,H()/2,H()*0.25,W()/2,H()/2,H()*0.9);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W(),H());

  // zone flash
  if(themeFlash>0){
    ctx.globalAlpha=themeFlash*0.4;
    ctx.fillStyle=theme.particleColor; ctx.fillRect(0,0,W(),H());
    ctx.globalAlpha=1; themeFlash=Math.max(0,themeFlash-0.04);
  }
}

// ═══════════════════════════════════
//  PLAYER  — pixel art inspired by sprite
//  Long dark hair, sunglasses, dark outfit, god.wifi vibe
// ═══════════════════════════════════
function drawPlayer(p) {
  const px = Math.round(p.x);
  const py = Math.round(p.y - cameraY);
  const f  = p.facing; // 1=right, -1=left
  const W_ = p.w, H_ = p.h;
  const S  = Math.max(1, Math.floor(W_/14)); // base pixel size ~3px

  // trail
  p.trail.forEach((t,i)=>{
    ctx.globalAlpha=(i/p.trail.length)*0.22;
    ctx.fillStyle='#880000';
    ctx.fillRect(Math.round(t.x)+2, Math.round(t.y-cameraY)+4, W_-4, H_-8);
  });
  ctx.globalAlpha=1;

  // combo halo
  if(combo>=5){
    ctx.globalAlpha=0.25+Math.sin(Date.now()*0.009)*0.15;
    ctx.fillStyle=combo>=12?'#ffd700':combo>=8?'#ff8800':'#ffff44';
    ctx.fillRect(px-4, py-6, W_+8, H_+10);
    ctx.globalAlpha=1;
  }

  // helper: draw pixel rect mirrored if facing left
  function R(x,y,w,h,c){
    ctx.fillStyle=c;
    const dx = f>0 ? px+x : px+(W_-x-w);
    ctx.fillRect(dx, py+y, w, h);
  }

  // ── HAIR (long, dark, flowing) ──
  // back hair (behind body)
  const hairW = Math.round(W_*0.55);
  const hairX = f>0 ? px+Math.round(W_*0.15) : px+Math.round(W_*0.3);
  ctx.fillStyle='#1a0e06';
  ctx.fillRect(hairX, py, hairW, Math.round(H_*0.72));
  // hair strands
  ctx.fillStyle='#2a1810';
  for(let i=0;i<4;i++){
    ctx.fillRect(hairX + i*Math.round(hairW/4), py+Math.round(H_*0.3),
                 Math.round(hairW/5), Math.round(H_*0.45));
  }
  // wild ends
  ctx.fillStyle='#1a0e06';
  const tailSide = f>0 ? px+Math.round(W_*0.6) : px+Math.round(W_*0.05);
  for(let i=0;i<3;i++){
    ctx.fillRect(tailSide+i*3, py+Math.round(H_*0.5)+i*6, 3, 10);
  }

  // ── HEAD ──
  const hx=Math.round(W_*0.22), hSz=Math.round(W_*0.55);
  ctx.fillStyle='#c8956a'; // skin tone
  ctx.fillRect(px+hx, py+2, hSz, Math.round(H_*0.28));

  // top hair
  ctx.fillStyle='#1a0e06';
  ctx.fillRect(px+hx-2, py, hSz+4, Math.round(H_*0.12));
  ctx.fillRect(px+hx, py, hSz, Math.round(H_*0.1));

  // ── SUNGLASSES ──
  const gy = py + Math.round(H_*0.1);
  const gx1 = f>0 ? px+Math.round(W_*0.24) : px+Math.round(W_*0.24);
  ctx.fillStyle='#000';
  ctx.fillRect(gx1, gy, Math.round(W_*0.22), Math.round(H_*0.1));
  ctx.fillRect(gx1+Math.round(W_*0.28), gy, Math.round(W_*0.22), Math.round(H_*0.1));
  // bridge
  ctx.fillStyle='#333';
  ctx.fillRect(gx1+Math.round(W_*0.22), gy+2, Math.round(W_*0.06), 3);
  // lens shine
  ctx.fillStyle='#fff';
  ctx.fillRect(gx1+2, gy+2, 3, 3);

  // mouth (open/singing)
  ctx.fillStyle='#8b3a3a';
  const mx = px + Math.round(W_*0.38);
  ctx.fillRect(mx, py+Math.round(H_*0.22), Math.round(W_*0.22), Math.round(H_*0.06));

  // ── BODY / HOODIE dark ──
  ctx.fillStyle='#1a1a24';
  ctx.fillRect(px+Math.round(W_*0.18), py+Math.round(H_*0.3), Math.round(W_*0.64), Math.round(H_*0.38));

  // hoodie detail / logo area
  ctx.fillStyle='#111';
  ctx.fillRect(px+Math.round(W_*0.35), py+Math.round(H_*0.38), Math.round(W_*0.3), Math.round(H_*0.18));
  // small god.wifi emblem pixel
  ctx.fillStyle='#e00';
  ctx.fillRect(px+Math.round(W_*0.44), py+Math.round(H_*0.42), 4, 4);
  ctx.fillRect(px+Math.round(W_*0.44)+2, py+Math.round(H_*0.42)-2, 2, 2);

  // ── BELT / waistband ──
  ctx.fillStyle='#888';
  ctx.fillRect(px+Math.round(W_*0.18), py+Math.round(H_*0.66), Math.round(W_*0.64), Math.round(H_*0.05));
  // belt text pixels (like logo on image)
  ctx.fillStyle='#fff';
  for(let bx=0;bx<5;bx++){
    ctx.fillRect(px+Math.round(W_*0.22)+bx*6, py+Math.round(H_*0.67), 4, 3);
  }

  // ── ARMS ──
  ctx.fillStyle='#1a1a24';
  if(!p.onGround){
    // arms up while jumping
    R(0, Math.round(H_*0.3), Math.round(W_*0.18), Math.round(H_*0.3),'#1a1a24');
    R(Math.round(W_*0.82), Math.round(H_*0.3), Math.round(W_*0.18), Math.round(H_*0.3),'#1a1a24');
    // fists
    R(0, Math.round(H_*0.28), Math.round(W_*0.18), Math.round(H_*0.1),'#c8956a');
    R(Math.round(W_*0.82), Math.round(H_*0.28), Math.round(W_*0.18), Math.round(H_*0.1),'#c8956a');
  } else {
    R(0, Math.round(H_*0.34), Math.round(W_*0.18), Math.round(H_*0.3),'#1a1a24');
    R(Math.round(W_*0.82), Math.round(H_*0.34), Math.round(W_*0.18), Math.round(H_*0.3),'#1a1a24');
    R(0, Math.round(H_*0.56), Math.round(W_*0.18), Math.round(H_*0.1),'#c8956a');
    R(Math.round(W_*0.82), Math.round(H_*0.56), Math.round(W_*0.18), Math.round(H_*0.1),'#c8956a');
  }

  // ── PANTS ──
  ctx.fillStyle='#1c1c28';
  ctx.fillRect(px+Math.round(W_*0.18), py+Math.round(H_*0.68), Math.round(W_*0.64), Math.round(H_*0.25));

  // ── LEGS ANIMATION ──
  const leg = p.onGround ? Math.floor(Date.now()/130)%2 : 1;
  ctx.fillStyle='#14141e';
  if(leg===0){
    R(Math.round(W_*0.2), Math.round(H_*0.82), Math.round(W_*0.22), Math.round(H_*0.18),'#14141e');
    R(Math.round(W_*0.52), Math.round(H_*0.78), Math.round(W_*0.22), Math.round(H_*0.22),'#14141e');
  } else {
    R(Math.round(W_*0.2), Math.round(H_*0.78), Math.round(W_*0.22), Math.round(H_*0.22),'#14141e');
    R(Math.round(W_*0.52), Math.round(H_*0.82), Math.round(W_*0.22), Math.round(H_*0.18),'#14141e');
  }

  // ── SHOES (black) ──
  R(Math.round(W_*0.16), Math.round(H_*0.92), Math.round(W_*0.3), Math.round(H_*0.08),'#111');
  R(Math.round(W_*0.5),  Math.round(H_*0.92), Math.round(W_*0.3), Math.round(H_*0.08),'#111');
}

// ═══════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════
let particles=[];
function spawnParticles(x,y,color,n=5){
  for(let i=0;i<n;i++){
    particles.push({
      x,y, vx:(Math.random()-0.5)*3.5, vy:-(Math.random()*3+0.5),
      life:1, color, size:2+Math.random()*3,
    });
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0.02);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life*=0.91;
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y-cameraY), Math.round(p.size), Math.round(p.size));
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════
//  HUD
// ═══════════════════════════════════
function drawHUD(theme){
  const fs=Math.floor(W()*0.026);
  ctx.font=`${fs}px 'Press Start 2P'`; ctx.textBaseline='top';
  ctx.shadowColor='#000'; ctx.shadowBlur=6; ctx.fillStyle='#fff';
  ctx.fillText(`FL ${floor}`,10,10);
  const sc=`${score}`;
  ctx.fillText(sc,W()/2-ctx.measureText(sc).width/2,10);
  const hi=`HI ${highScore}`;
  ctx.fillText(hi,W()-ctx.measureText(hi).width-10,10);

  ctx.font=`${Math.floor(fs*0.72)}px 'Press Start 2P'`;
  ctx.fillStyle=theme.particleColor; ctx.shadowColor=theme.particleColor; ctx.shadowBlur=8;
  ctx.fillText(theme.name,W()-ctx.measureText(theme.name).width-10,H()-18);

  if(combo>=3){
    ctx.font=`${Math.floor(fs*1.2)}px 'Press Start 2P'`;
    const cc=combo>=12?'#ffd700':combo>=8?'#ff8800':'#ffff44';
    ctx.fillStyle=cc; ctx.shadowColor=cc; ctx.shadowBlur=16;
    const ct=`x${combo} COMBO!`;
    ctx.fillText(ct,W()/2-ctx.measureText(ct).width/2,H()*0.14);
  }
  ctx.shadowBlur=0;
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.83)'; ctx.fillRect(0,0,W(),H());
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`${Math.floor(W()*0.065)}px 'Press Start 2P'`;
  ctx.fillStyle='#e00'; ctx.shadowColor='#f00'; ctx.shadowBlur=24;
  ctx.fillText('GAME OVER',W()/2,H()*0.33);
  ctx.shadowBlur=0; ctx.fillStyle='#fff';
  ctx.font=`${Math.floor(W()*0.028)}px 'Press Start 2P'`;
  ctx.fillText(`FLOOR  ${floor}`,W()/2,H()*0.47);
  ctx.fillText(`SCORE  ${score}`,W()/2,H()*0.55);
  if(score>0&&score>=highScore){
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=12;
    ctx.fillText('NEW RECORD!',W()/2,H()*0.63); ctx.shadowBlur=0;
  }
  ctx.fillStyle='#555';
  ctx.font=`${Math.floor(W()*0.022)}px 'Press Start 2P'`;
  ctx.fillText('SPACJA = RESTART',W()/2,H()*0.79);
  ctx.textAlign='left';
}

// ═══════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════
const GRAVITY_    = ()=>H()*0.00105;
const JUMP_POWER_ = ()=>-H()*0.021;
const MOVE_ACC_   = ()=>W()*0.0016;
const MAX_SPD_    = ()=>W()*0.011;
const FRICTION_   = 0.87;
const MAX_FALL_   = ()=>H()*0.024;

let score,floor,combo,comboTimer,highScore=0;
let cameraY,themeFlash,lastThemeIdx;
let isGameOver,gameRunning;
let jumpPressed;
let keys={};
let frameId;
let player;

function createPlayer(){
  return {
    x:W()/2-20, y:H()-130,
    w:42, h:60,
    vx:0, vy:0,
    onGround:false, facing:1, trail:[],
  };
}

function physics(){
  const p=player;
  const theme=getTheme(floor);

  if(keys['ArrowLeft']||keys['a']||keys['A']){p.vx-=MOVE_ACC_();p.facing=-1;}
  else if(keys['ArrowRight']||keys['d']||keys['D']){p.vx+=MOVE_ACC_();p.facing=1;}
  else p.vx*=FRICTION_;
  if(p.vx>MAX_SPD_())p.vx=MAX_SPD_();
  if(p.vx<-MAX_SPD_())p.vx=-MAX_SPD_();

  const wantJump=keys['ArrowUp']||keys[' ']||keys['w']||keys['W'];
  if(wantJump&&!jumpPressed&&p.onGround){
    const boost=Math.min(combo*0.09,1.3);
    p.vy=JUMP_POWER_()*(1+boost);
    p.onGround=false; jumpPressed=true;
    spawnParticles(p.x+p.w/2,p.y+p.h,theme.particleColor,8);
  }
  if(!wantJump)jumpPressed=false;

  p.vy+=GRAVITY_();
  if(p.vy>MAX_FALL_())p.vy=MAX_FALL_();

  const STEPS=5;
  const svx=p.vx/STEPS, svy=p.vy/STEPS;
  p.onGround=false;

  for(let s=0;s<STEPS;s++){
    p.x+=svx; p.y+=svy;
    if(p.x+p.w<0)p.x=W();
    if(p.x>W())p.x=-p.w;

    if(svy>=0){
      for(const plat of platforms){
        const pB=p.y+p.h, pL=p.x+4, pR=p.x+p.w-4;
        if(pR<=plat.x||pL>=plat.x+plat.w)continue;
        if(pB>=plat.y&&pB<=plat.y+plat.h+Math.abs(svy)+3){
          p.y=plat.y-p.h; p.vy=0; p.onGround=true;
          const pf=Math.round((-plat.y)/GAP_Y());
          if(pf>floor){
            const diff=pf-floor; floor=pf;
            score+=diff*(1+Math.floor(combo*0.5));
            combo+=diff; comboTimer=160;
            if(score>highScore)highScore=score;
            spawnParticles(p.x+p.w/2,p.y,theme.particleColor,6);
          }
          break;
        }
      }
    }
    if(p.onGround)break;
  }

  p.trail.push({x:p.x,y:p.y});
  if(p.trail.length>8)p.trail.shift();

  comboTimer>0?comboTimer--:(combo=0);

  const targetCam=p.y-H()*0.42;
  cameraY+=(targetCam-cameraY)*0.055;

  if(p.y-cameraY>H()+80)isGameOver=true;

  const topY=cameraY-H()*0.6;
  while(!platforms.length||platforms[platforms.length-1].y>topY){
    const ly=platforms.length?platforms[platforms.length-1].y:H()-18;
    platforms.push(makePlat(ly-GAP_Y()*(0.72+Math.random()*0.55)));
  }
  platforms=platforms.filter(pl=>pl.y-cameraY<H()+250);

  const ti=THEMES.indexOf(getTheme(floor));
  if(ti!==lastThemeIdx){
    themeFlash=1; lastThemeIdx=ti;
    bgStars=buildStars(getTheme(floor).stars);
    platCache.clear();
  }
}

// ═══════════════════════════════════
//  LOOP
// ═══════════════════════════════════
function loop(){
  frameId=requestAnimationFrame(loop);
  const theme=getTheme(floor);
  drawBackground(theme);
  if(!isGameOver){
    physics();
    platforms.forEach(pl=>drawPlatform(pl,theme));
    updateParticles();
    drawPlayer(player);
    drawHUD(theme);
  } else {
    platforms.forEach(pl=>drawPlatform(pl,theme));
    drawPlayer(player);
    drawGameOver();
  }
}

// ═══════════════════════════════════
//  START
// ═══════════════════════════════════
function startGame(){
  document.getElementById('overlay').style.display='none';
  player=createPlayer();
  platforms=[]; particles=[];
  score=0; floor=0; combo=0; comboTimer=0;
  cameraY=0; themeFlash=0; lastThemeIdx=0;
  isGameOver=false; gameRunning=true; jumpPressed=false;
  platCache.clear();
  bgStars=buildStars(THEMES[0].stars);
  buildPlatforms();
  if(frameId)cancelAnimationFrame(frameId);
  loop();
}

// ═══════════════════════════════════
//  INPUT
// ═══════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(isGameOver&&(e.key===' '||e.key==='Enter'))startGame();
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
},{passive:false});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// mobile
const isMobile='ontouchstart' in window;
if(isMobile){
  function vbtn(label,leftCSS,rightCSS,onD,onU){
    const d=document.createElement('div');
    d.className='vbtn'; d.textContent=label;
    if(leftCSS)d.style.left=leftCSS; else d.style.right=rightCSS;
    d.addEventListener('touchstart',e=>{e.preventDefault();onD();},{passive:false});
    d.addEventListener('touchend',  e=>{e.preventDefault();onU();},{passive:false});
    document.body.appendChild(d);
  }
  vbtn('◄','16px',null,  ()=>keys['ArrowLeft']=true,  ()=>keys['ArrowLeft']=false);
  vbtn('►','92px',null,  ()=>keys['ArrowRight']=true, ()=>keys['ArrowRight']=false);
  vbtn('↑',null,'16px',  ()=>keys[' ']=true,          ()=>keys[' ']=false);
  canvas.addEventListener('touchend',e=>{
    if(isGameOver)startGame();
  },{passive:true});
}
</script>
